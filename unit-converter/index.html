<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit Converter — km ↔ mi</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <main class="converter">
    <h1>Unit Converter</h1>
    <p class="subtitle">Convert between kilometers and miles</p>

    <!-- The user types a number here -->
    <label for="amount">Amount</label>
    <input type="number" id="amount" placeholder="Enter a number" step="any">

    <!-- The user picks which direction to convert -->
    <label for="direction">Direction</label>
    <select id="direction">
      <option value="km-to-mi">Kilometers → Miles</option>
      <option value="mi-to-km">Miles → Kilometers</option>
    </select>

    <button id="convert-btn">Convert</button>

    <!-- The answer appears here -->
    <p id="result" class="result"></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
